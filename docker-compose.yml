name: ${COMPOSE_PROJECT_NAME:-devcore_php}

networks:
  devnet:
    name: ${DOCKER_NETWORK_NAME:-devcore_php_net}
    driver: bridge

services:
  app:
    build:
      context: ./
      dockerfile: ${APP_DOCKERFILE:-docker/app/Dockerfile.php.8.4}
      args:
        UID: ${APP_UID:-1000}
        GID: ${APP_GID:-1000}
        APP_NODE_JS: ${APP_NODE_JS:-true}
        APP_SQL_SERVER: ${APP_SQL_SERVER:-false}
        TZ: ${TZ:-America/Sao_Paulo}
    container_name: ${APP_CONTAINER_NAME:-app}
    tty: true
    ports:
      - "${APP_PORT_HTTP:-8080}:80"
      - "${APP_PORT_LARAVEL:-8000}:8000"
      - "${APP_PORT_FPM:-9000}:9000"
    volumes:
      - ./conf/app/php/php.ini-development:/usr/local/etc/php/php.ini:ro
      - ./conf/app/ssl/openssl.cnf:/etc/ssl/openssl.cnf:ro
      - ./www:/var/www:rw
      - ./conf/app/vhost:/etc/apache2/sites-enabled:ro
      - ./conf/ubuntu/bashrc.bash:/root/.bashrc:ro
      - ./conf/ubuntu/bashrc.bash:/home/app/.bashrc:ro
      - ./logs/php:/tmp/php
      - ./logs/cron:/var/log/cron
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      APACHE_LOG_DIR: /tmp
      INSTALL_DIR: /var/www
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql_db:
        condition: service_healthy
    networks:
      - devnet
    restart: unless-stopped

  mysql_db:
    build:
      context: docker/mysql
    container_name: ${MYSQL_CONTAINER_NAME:-mysql_db}
    restart: unless-stopped
    tty: true
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - ${DB_DATA_DIR:-./dbdata}:/var/lib/mysql
      - ./conf/mysql/my.cnf:/etc/mysql/conf.d/config-file.cnf:ro
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-app}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-app}
      TZ: ${TZ:-America/Sao_Paulo}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - devnet

  phpmyadmin:
    build:
      context: docker/phpmyadmin
    container_name: ${PHPMYADMIN_CONTAINER_NAME:-phpmyadmin}
    restart: unless-stopped
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    environment:
      PMA_HOST: ${PMA_HOST:-mysql_db}
      PMA_PORT: ${PMA_PORT:-3306}
      PMA_ARBITRARY: ${PMA_ARBITRARY:-0}
      UPLOAD_LIMIT: ${PHPMYADMIN_UPLOAD_LIMIT:-128M}
    depends_on:
      mysql_db:
        condition: service_healthy
    networks:
      - devnet
